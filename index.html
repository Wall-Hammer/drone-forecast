<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Kiosk</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    /* Top bar */
    .topbar {
      height: 60px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      background: #1b1b1b;
      border-bottom: 1px solid #333;
      font-size: 18px;
      z-index: 5;
    }

    .title {
      font-weight: bold;
    }

    .clock {
      font-size: 24px;
      font-weight: bold;
    }

    /* Main map area */
    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }

    #windy-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* Overlay buttons */
    .overlay-buttons {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .overlay-buttons button {
      background: rgba(20,20,20,0.85);
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    .overlay-buttons button.active {
      background: #2d5cff;
      border-color: #2d5cff;
    }

    /* Bottom forecast strip */
    .forecast-strip {
      height: 150px;
      flex-shrink: 0;
      background: #181818;
      border-top: 1px solid #333;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .day-card {
      flex: 0 0 14.28%;
      min-width: 120px;
      border-right: 1px solid #2c2c2c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px 8px;
      box-sizing: border-box;
      text-align: center;
    }

    .day-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .weather-icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .temp {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .details {
      font-size: 13px;
      color: #bbb;
      line-height: 1.4;
    }

    /* Better for narrow screens */
    @media (max-width: 900px) {
      .topbar {
        height: 52px;
        font-size: 16px;
      }

      .clock {
        font-size: 20px;
      }

      .forecast-strip {
        height: 130px;
      }

      .day-card {
        min-width: 105px;
      }

      .temp {
        font-size: 20px;
      }

      .details {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">Katowice Weather</div>
      <div class="clock" id="clock">--:--</div>
    </div>

    <div class="map-wrap">
      <div class="overlay-buttons">
        <button class="active" data-overlay="wind">Wind</button>
        <button data-overlay="radar">Radar</button>
        <button data-overlay="temp">Temp</button>
        <button data-overlay="clouds">Clouds</button>
      </div>

      <iframe id="windy-frame" src=""></iframe>
    </div>

    <div class="forecast-strip" id="forecast-strip">
      <!-- Forecast cards inserted here -->
    </div>
  </div>

  <script>
    var CONFIG = {
      lat: 50.2649,
      lon: 19.0238,
      zoom: 7,
      level: "surface",
      overlay: "wind"
    };

    var frame = document.getElementById("windy-frame");
    var buttons = document.querySelectorAll(".overlay-buttons button");
    var forecastStrip = document.getElementById("forecast-strip");

    function buildWindyUrl(overlay) {
      return "https://embed.windy.com/embed2.html" +
        "?lat=" + CONFIG.lat +
        "&lon=" + CONFIG.lon +
        "&zoom=" + CONFIG.zoom +
        "&level=" + CONFIG.level +
        "&overlay=" + overlay +
        "&menu=" +
        "&message=" +
        "&marker=" +
        "&calendar=" +
        "&pressure=" +
        "&type=map" +
        "&location=coordinates" +
        "&detail=" +
        "&metricWind=default" +
        "&metricTemp=default";
    }

    function setOverlay(overlay) {
      CONFIG.overlay = overlay;
      frame.src = buildWindyUrl(overlay);

      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
        if (buttons[i].getAttribute("data-overlay") === overlay) {
          buttons[i].classList.add("active");
        }
      }
    }

    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener("click", function () {
        setOverlay(this.getAttribute("data-overlay"));
      });
    }

    function updateClock() {
      var now = new Date();
      var hours = now.getHours();
      var minutes = now.getMinutes();

      if (hours < 10) hours = "0" + hours;
      if (minutes < 10) minutes = "0" + minutes;

      document.getElementById("clock").textContent = hours + ":" + minutes;
    }

    setInterval(updateClock, 1000);
    updateClock();
    setOverlay(CONFIG.overlay);

    // Placeholder forecast data (easy to replace later with real API)
    var forecastData = [
      { day: "Thu", icon: "🌤", temp: "12°C", wind: "14 km/h", rain: "0 mm" },
      { day: "Fri", icon: "🌦", temp: "10°C", wind: "18 km/h", rain: "2 mm" },
      { day: "Sat", icon: "🌧", temp: "9°C", wind: "20 km/h", rain: "5 mm" },
      { day: "Sun", icon: "☁", temp: "11°C", wind: "12 km/h", rain: "0 mm" },
      { day: "Mon", icon: "🌤", temp: "13°C", wind: "10 km/h", rain: "0 mm" },
      { day: "Tue", icon: "☀", temp: "15°C", wind: "9 km/h", rain: "0 mm" },
      { day: "Wed", icon: "🌦", temp: "14°C", wind: "16 km/h", rain: "1 mm" }
    ];

    function renderForecast() {
      var html = "";

      for (var i = 0; i < forecastData.length; i++) {
        var item = forecastData[i];
        html +=
          '<div class="day-card">' +
            '<div class="day-name">' + item.day + '</div>' +
            '<div class="weather-icon">' + item.icon + '</div>' +
            '<div class="temp">' + item.temp + '</div>' +
            '<div class="details">Wind: ' + item.wind + '<br>Rain: ' + item.rain + '</div>' +
          '</div>';
      }

      forecastStrip.innerHTML = html;
    }

    renderForecast();

    // Optional safety reload for long-running kiosk
    setInterval(function () {
      location.reload();
    }, 1000 * 60 * 60 * 6); // every 6 hours
  </script>
</body>
</html>
