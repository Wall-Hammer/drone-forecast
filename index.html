<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rybnik Weather Kiosk</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    .topbar {
      height: 56px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      z-index: 5;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .clock {
      font-size: 26px;
      font-weight: bold;
    }

    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }

    #windy-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .overlay-buttons {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .overlay-buttons button {
      background: rgba(20,20,20,0.9);
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    .overlay-buttons button.active {
      background: #2d5cff;
      border-color: #2d5cff;
    }

    .bottom-frame {
      height: 330px;
      flex-shrink: 0;
      border-top: 1px solid #333;
      background: #181818;
    }

    #forecast-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #181818;
    }

    @media (max-width: 900px) {
      .topbar {
        height: 50px;
      }

      .title {
        font-size: 18px;
      }

      .clock {
        font-size: 22px;
      }

      .bottom-frame {
        height: 300px;
      }

      .overlay-buttons button {
        font-size: 14px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">Rybnik Weather</div>
      <div class="clock" id="clock">--:--</div>
    </div>

    <div class="map-wrap">
      <div class="overlay-buttons">
        <button class="active" data-overlay="wind">Wind</button>
        <button data-overlay="radar">Radar</button>
        <button data-overlay="temp">Temp</button>
        <button data-overlay="clouds">Clouds</button>
      </div>

      <iframe id="windy-frame" src=""></iframe>
    </div>

    <div class="bottom-frame">
      <!-- Replace this URL with your real forecast page later if you want -->
      <iframe
        id="forecast-frame"
        src="https://www.meteoblue.com/en/weather/week/rybnik_poland_3082475?utm_source=chatgpt-kiosk"
        loading="eager">
      </iframe>
    </div>
  </div>

  <script>
    var CONFIG = {
      lat: 50.0971,
      lon: 18.5418,
      zoom: 9,
      level: "surface",
      overlay: "wind"
    };

    var frame = document.getElementById("windy-frame");
    var buttons = document.querySelectorAll(".overlay-buttons button");

    function buildWindyUrl(overlay) {
      return "https://embed.windy.com/embed2.html" +
        "?lat=" + CONFIG.lat +
        "&lon=" + CONFIG.lon +
        "&zoom=" + CONFIG.zoom +
        "&level=" + CONFIG.level +
        "&overlay=" + overlay +
        "&menu=" +
        "&message=" +
        "&marker=true" +
        "&calendar=" +
        "&pressure=" +
        "&type=map" +
        "&location=coordinates" +
        "&detail=" +
        "&metricWind=default" +
        "&metricTemp=default";
    }

    function setOverlay(overlay) {
      CONFIG.overlay = overlay;
      frame.src = buildWindyUrl(overlay);

      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
        if (buttons[i].getAttribute("data-overlay") === overlay) {
          buttons[i].classList.add("active");
        }
      }
    }

    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener("click", function () {
        setOverlay(this.getAttribute("data-overlay"));
      });
    }

    function updateClock() {
      var now = new Date();
      var h = now.getHours();
      var m = now.getMinutes();
      if (h < 10) h = "0" + h;
      if (m < 10) m = "0" + m;
      document.getElementById("clock").textContent = h + ":" + m;
    }

    updateClock();
    setInterval(updateClock, 1000);

    setOverlay(CONFIG.overlay);

    // Auto refresh every hour
    setInterval(function () {
      location.reload();
    }, 1000 * 60 * 60);
  </script>
</body>
</html>
