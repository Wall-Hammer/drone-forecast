<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Windy Kiosk – Katowice</title>
  <meta name="theme-color" content="#0f1115" />
  <style>
    :root{
      --bg:#0f1115;
      --panel:#161a22cc;
      --panel-strong:#161a22ee;
      --text:#eef3ff;
      --muted:#a7b2c7;
      --accent:#4da3ff;
      --danger:#ff5f6d;
      --radius:18px;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      touch-action: manipulation;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0b0d12;
    }

    /* Windy fills the whole screen */
    #windy-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b0d12;
    }

    /* Top HUD */
    .hud {
      position: absolute;
      left: calc(14px + var(--safe-left));
      right: calc(14px + var(--safe-right));
      top: calc(14px + var(--safe-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      pointer-events: none; /* so map still pans underneath except on controls */
      z-index: 20;
    }

    .card {
      pointer-events: auto;
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      min-width: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #2dd36f;
      box-shadow: 0 0 18px rgba(45,211,111,.65);
      flex: 0 0 auto;
    }

    .title-wrap { min-width: 0; }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .clock {
      padding: 12px 16px;
      text-align: right;
      min-width: 180px;
    }
    .time {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: .6px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .date {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Bottom controls */
    .controls {
      position: absolute;
      left: calc(14px + var(--safe-left));
      right: calc(14px + var(--safe-right));
      bottom: calc(14px + var(--safe-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
      pointer-events: none;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px;
      pointer-events: auto;
      flex-wrap: wrap;
      max-width: min(92vw, 920px);
    }

    .btn {
      appearance: none;
      border: 0;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      min-height: 46px;
      min-width: 88px;
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
    }
    .btn:active { transform: scale(.98); }
    .btn.active {
      background: rgba(77,163,255,.18);
      border-color: rgba(77,163,255,.42);
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(77,163,255,.18);
    }

    .meta {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      pointer-events: auto;
      white-space: nowrap;
    }

    /* Hide everything if user is idle for a cleaner kiosk */
    .fadeable {
      opacity: 1;
      transition: opacity .35s ease;
    }
    body.idle .fadeable {
      opacity: .18;
    }

    @media (max-width: 900px) {
      .hud { gap: 10px; }
      .clock { min-width: 0; padding: 10px 12px; }
      .time { font-size: 24px; }
      .title { font-size: 16px; }
      .subtitle, .date, .meta { font-size: 12px; }
      .btn { min-width: 76px; padding: 10px 12px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <iframe
      id="windy-frame"
      title="Windy map"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="fullscreen"
      src="">
    </iframe>

    <div class="hud fadeable">
      <div class="brand card">
        <div class="dot" aria-hidden="true"></div>
        <div class="title-wrap">
          <div class="title" id="locationLabel">Katowice Weather Map</div>
          <div class="subtitle">Fullscreen kiosk • touch to pan / pinch to zoom</div>
        </div>
      </div>

      <div class="clock card" aria-live="polite">
        <div class="time" id="timeNow">--:--</div>
        <div class="date" id="dateNow">—</div>
      </div>
    </div>

    <div class="controls fadeable">
      <div class="toolbar card" id="toolbar" role="toolbar" aria-label="Weather layers">
        <button class="btn active" data-overlay="wind">Wind</button>
        <button class="btn" data-overlay="radar">Radar</button>
        <button class="btn" data-overlay="temp">Temp</button>
        <button class="btn" data-overlay="clouds">Clouds</button>
        <button class="btn" data-overlay="rain">Rain</button>
      </div>

      <div class="meta card" id="statusMeta">
        Katowice • Surface • Zoom 7
      </div>
    </div>
  </div>

  <script>
    // --- Configuration ---
    const CONFIG = {
      lat: 50.2649,
      lon: 19.0238,
      zoom: 7,
      level: "surface",
      overlay: "wind",
      locationLabel: "Katowice Weather Map",
      metricWind: "default",
      metricTemp: "default",
      // Optional: set detail=true to show point forecast detail in embed when clicking
      detail: false,
      // Optional: if you prefer a marker pin:
      marker: false,
      // Reload every 6 hours as a safety net for long-running kiosk sessions
      reloadMs: 1000 * 60 * 60 * 6,
      // Fade HUD after inactivity
      idleMs: 15000
    };

    const frame = document.getElementById("windy-frame");
    const toolbar = document.getElementById("toolbar");
    const timeNow = document.getElementById("timeNow");
    const dateNow = document.getElementById("dateNow");
    const locationLabel = document.getElementById("locationLabel");
    const statusMeta = document.getElementById("statusMeta");

    locationLabel.textContent = CONFIG.locationLabel;

    function windyUrl(overlay = CONFIG.overlay) {
      const p = new URLSearchParams({
        lat: String(CONFIG.lat),
        lon: String(CONFIG.lon),
        zoom: String(CONFIG.zoom),
        level: CONFIG.level,
        overlay,
        menu: "",
        message: "",
        marker: CONFIG.marker ? "true" : "",
        calendar: "",
        pressure: "",
        type: "map",
        location: "coordinates",
        detail: CONFIG.detail ? "true" : "",
        metricWind: CONFIG.metricWind,
        metricTemp: CONFIG.metricTemp
      });
      return `https://embed.windy.com/embed2.html?${p.toString()}`;
    }

    function setOverlay(overlay) {
      CONFIG.overlay = overlay;
      frame.src = windyUrl(overlay);

      // Update active button
      [...toolbar.querySelectorAll(".btn")].forEach(btn => {
        btn.classList.toggle("active", btn.dataset.overlay === overlay);
      });

      statusMeta.textContent = `Katowice • Surface • Zoom ${CONFIG.zoom} • ${overlayLabel(overlay)}`;
    }

    function overlayLabel(key) {
      const labels = {
        wind: "Wind",
        radar: "Radar",
        temp: "Temperature",
        clouds: "Clouds",
        rain: "Rain"
      };
      return labels[key] || key;
    }

    toolbar.addEventListener("click", (e) => {
      const btn = e.target.closest(".btn");
      if (!btn) return;
      setOverlay(btn.dataset.overlay);
    });

    // Clock
    function updateClock() {
      const now = new Date();
      timeNow.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
      dateNow.textContent = now.toLocaleDateString([], {
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }
    updateClock();
    setInterval(updateClock, 1000 * 15);

    // Initial load
    setOverlay(CONFIG.overlay);

    // Safety reload for kiosk reliability
    setInterval(() => {
      location.reload();
    }, CONFIG.reloadMs);

    // Idle fade
    let idleTimer;
    const bumpActivity = () => {
      document.body.classList.remove("idle");
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => document.body.classList.add("idle"), CONFIG.idleMs);
    };
    ["touchstart","touchmove","mousedown","mousemove","keydown"].forEach(evt => {
      window.addEventListener(evt, bumpActivity, { passive: true });
    });
    bumpActivity();
  </script>
</body>
</html>
